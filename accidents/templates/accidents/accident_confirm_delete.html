{% extends "base.html" %}

{% block title %}Удаление ДТП{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card border-danger">
            <div class="card-body">
                <h1 class="h4">Удалить карточку ДТП?</h1>
                <p class="text-muted">Будут удалены участники, автомобили, повреждения, фотографии, свидетельские показания и журнал отправки по ДТП «{{ accident.title }}».</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button class="btn btn-danger" type="submit">Удалить</button>
                        <a class="btn btn-outline-secondary" href="{% url 'accidents:detail' accident.pk %}">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
