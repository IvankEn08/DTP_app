{% extends "base.html" %}

{% block title %}Добавление повреждения{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <h1 class="h3 mb-3">Добавление повреждения</h1>
        <div class="card">
            <div class="card-body">
                <form method="post" novalidate>
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                            {{ field }}
                            {% for error in field.errors %}<div class="invalid-feedback d-block">{{ error }}</div>{% endfor %}
                        </div>
                    {% endfor %}
                    <div class="d-flex gap-2">
                        <button class="btn btn-primary" type="submit">Добавить повреждение</button>
                        <a class="btn btn-outline-secondary" href="{% url 'accidents:detail' accident.pk %}">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
